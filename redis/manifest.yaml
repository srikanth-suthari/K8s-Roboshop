apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    component: redis
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: redis
      tier: backend
  template:
    metadata:
      name: redis
      labels:
        project: roboshop
        component: redis
        tier: backend
    spec:
      containers:
      - name: redis
        image: srikanthsuthari/redis:v1
        imagePullPolicy: Always
        # readinessProbe:
        #   httpGet:
        #     path: /health
        #     port: 6379
        #   initialDelaySeconds: 20
        #   periodSeconds: 10
        # livenessProbe:
        #   httpGet:
        #     path: /health
        #     port: 6379
        #   initialDelaySeconds: 10
        #   periodSeconds: 5
---
# Service for redis
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
spec:
  selector:
    project: roboshop
    component: redis
    tier: backend
  ports:
  - protocol: TCP
    port: 6379
    targetPort: 6379