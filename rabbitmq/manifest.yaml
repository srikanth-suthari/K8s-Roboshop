apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  labels:
    project: roboshop
    component: rabbitmq
    tier: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: rabbitmq
      tier: backend
  template:
    metadata:
      name: rabbitmq
      labels:
        project: roboshop
        component: rabbitmq
        tier: backend
    spec:
      containers:
      - name: rabbitmq
        image: rabbitmq:7
        imagePullPolicy: Always
      readinessProbe:
        httpGet:
          path: /health
          port: 